name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP ${{ matrix.php }} • Bootstrap only
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    # Safe defaults for Symfony in CI (no secrets, boots Kernel fine)
    env:
      APP_ENV: test
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data_%kernel.environment%.db"
      # OFF by default; we flip it ON only on PHP 8.4 below
      ENABLE_NATIVE_LAZY_OBJECTS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer
          # sqlite for default DB, plus common Symfony deps
          extensions: pdo_sqlite, sqlite3, mbstring, intl, xml, zip, curl

      # Turn ON native lazy only on PHP 8.4 (before composer install)
      - name: Enable Doctrine native lazy objects on PHP 8.4
        if: matrix.php == '8.4'
        run: echo "ENABLE_NATIVE_LAZY_OBJECTS=1" >> "$GITHUB_ENV"

      - name: Show versions & env
        run: |
          php -v
          composer -V
          echo "ENABLE_NATIVE_LAZY_OBJECTS=$ENABLE_NATIVE_LAZY_OBJECTS"
          echo "APP_ENV=$APP_ENV"
          echo "DATABASE_URL=$DATABASE_URL"

      # Optional: cache composer
      - name: Restore Composer cache (optional)
        if: hashFiles('composer.lock') != ''
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-
            composer-${{ runner.os }}-

      # Install without running Symfony auto-scripts (avoids cache:clear during install)
      - name: Install dependencies (optional)
        if: hashFiles('composer.json') != ''
        env:
          SYMFONY_SKIP_AUTO_SCRIPTS: "1"
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Composer validate (optional)
        if: hashFiles('composer.json') != ''
        run: composer validate --strict --no-check-publish

      # Detect optional composer scripts so jobs stay flexible
      - id: detect-scripts
        if: hashFiles('composer.json') != ''
        run: |
          php -r '$j=@json_decode(@file_get_contents("composer.json"),true)?:[];
          foreach (["cs:check","stan","test"] as $k) {
            $v = (isset($j["scripts"][$k]) ? "1" : "0");
            $out = strtoupper(str_replace([":","-"],["_","_"],$k));
            echo "$out=$v\n";
          }' >> $GITHUB_OUTPUT

      - name: Code style check (optional)
        if: ${{ steps.detect-scripts.outputs.CS_CHECK == '1' }}
        run: composer cs:check

      - name: Static analysis (optional)
        if: ${{ steps.detect-scripts.outputs.STAN == '1' }}
        run: composer stan

      - name: Test suite (optional)
        if: ${{ steps.detect-scripts.outputs.TEST == '1' }}
        run: composer test
