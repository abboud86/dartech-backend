name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP ${{ matrix.php }} • Bootstrap only
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    env:
      APP_ENV: test
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data_%kernel.environment%.db"
      ENABLE_NATIVE_LAZY_OBJECTS: ${{ matrix.php == '8.4' && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer
          extensions: mbstring, intl, xml, zip

      - name: Show versions
        run: |
          php -v
          composer -V

      # === Tout ce qui suit est OPTIONNEL et ne s'exécute que si les fichiers existent ===

      - name: Restore Composer cache (optional)
        if: hashFiles('composer.lock') != ''
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-
            composer-${{ runner.os }}-

      - name: Install dependencies (optional)
        if: hashFiles('composer.json') != ''
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Composer validate (optional)
        if: hashFiles('composer.json') != ''
        run: composer validate --strict --no-check-publish

      # Détection des scripts (optionnel)
      - id: detect-scripts
        if: hashFiles('composer.json') != ''
        run: |
          php -r '$j=@json_decode(@file_get_contents("composer.json"),true)?:[];
          foreach (["cs:check","stan","test"] as $k) {
            $v = (isset($j["scripts"][$k]) ? "1" : "0");
            $out = strtoupper(str_replace([":","-"],["_","_"],$k));
            echo "$out=$v\n";
          }' >> $GITHUB_OUTPUT

      # Qualité/tests (optionnels, s'exécutent seulement si présents)
      - name: Code style check (optional)
        if: ${{ steps.detect-scripts.outputs.CS_CHECK == '1' }}
        run: composer cs:check

      - name: Static analysis (optional)
        if: ${{ steps.detect-scripts.outputs.STAN == '1' }}
        run: composer stan

      - name: Test suite (optional)
        if: ${{ steps.detect-scripts.outputs.TEST == '1' }}
        run: composer test
