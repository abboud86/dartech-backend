name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  phpunit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
          extensions: mbstring, intl, pdo, pdo_pgsql, json

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # 🔎 PROUVER que l’override test est bien chargé
      - name: Show loaded security throttling (test)
        run: |
          php -v
          php bin/console --env=test --no-debug debug:config security | sed -n '/login_throttling/,+10p'
          php bin/console --env=test --no-debug debug:config framework rate_limiter

      # 🧹 Pool en mémoire (normalement déjà via config/packages/test/cache.yaml)
      - name: Clear rate limiter pool (test)
        run: php bin/console cache:pool:clear cache.rate_limiter --env=test

      - name: PHPUnit (test, no debug)
        env:
          APP_ENV: test
          APP_DEBUG: 0
        run: php bin/phpunit --no-coverage
