name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP ${{ matrix.php }} • Quality & Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.3', '8.4' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo_pgsql, zip, xml
          tools: composer
          coverage: none

      - name: Show versions
        run: |
          php -v
          composer -V

      # Cache Composer (clé sur composer.lock + version de PHP)
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-
            composer-${{ runner.os }}-

      - name: Install dependencies
        if: hashFiles('composer.json') != ''
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Composer validate
        if: hashFiles('composer.json') != ''
        run: composer validate --strict --no-check-publish

      - name: Prepare Symfony test env
        run: |
          if [ -f ".env.test" ]; then cp -n .env.test .env || true; fi
          php -r "echo 'APP_ENV='.('test').PHP_EOL;" >> .env 2>/dev/null || true
          php bin/console --env=test cache:clear

      # --- Qualité & Tests : scripts Composer (DoD Symfony Feature) ---
      - name: Code style check
        run: composer cs:check

      - name: Static analysis
        run: composer stan

      - name: Test suite
        run: composer test
