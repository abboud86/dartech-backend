name: "Feature request"
description: "Demande de fonctionnalité"
title: "[Feature]: "
labels: ["type:feature"]
body:
  - type: input
    id: phase
    attributes: { label: "Phase (p0–p6)", placeholder: "p1" }
    validations: { required: true }
  - type: dropdown
    id: scope
    attributes:
      label: "Scope"
      options: ["backend","web","mobile","db","ci","infra"]
    validations: { required: true }
  - type: textarea
    id: description
    attributes: { label: "Description", placeholder: "Objectif, critères d'acceptation" }
    validations: { required: true }
