name: "Bug report"
description: "Rapport de bug"
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: textarea
    id: steps
    attributes: { label: "Steps to reproduce", placeholder: "1. … 2. …" }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: "Expected behavior" }
    validations: { required: true }
  - type: textarea
    id: actual
    attributes: { label: "Actual behavior / logs" }
    validations: { required: true }
  - type: dropdown
    id: scope
    attributes:
      label: "Scope"
      options: ["backend","web","mobile","db","ci","infra"]
