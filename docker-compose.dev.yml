name: dartech-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: dartech-postgres
    environment:
      POSTGRES_DB: dartech_dev
      POSTGRES_USER: dartech
      POSTGRES_PASSWORD: dartech
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    profiles: ["dev"]
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: dartech-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    profiles: ["dev"]
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pg_data:
  redis_data:
